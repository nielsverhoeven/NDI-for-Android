name: MAUI CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore NdiForAndroid.sln

      - name: Build Core library
        run: dotnet build src/Core/NdiForAndroid.Core.csproj --no-restore -c Release

      - name: Build MAUI Android app
        run: dotnet build src/MauiApp/NdiForAndroid.csproj --no-restore -c Release

      - name: Run unit tests
        run: dotnet test tests/MauiApp.Tests/NdiForAndroid.Tests.csproj --no-restore -c Release --logger "trx;LogFileName=test-results.trx" --results-directory test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/*.trx
          if-no-files-found: warn
