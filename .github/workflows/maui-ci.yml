name: NDI for Android - Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  # ──────────────────────────────────────────────────────
  # Stage 1 — Build Core + MauiApp + Unit Tests
  # ──────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.301'

      - name: Cache MAUI workload
        id: cache-workload
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/workloads
          key: workload-net10.0-android-10.0.20
          restore-keys: |
            workload-net10.0-android-

      - name: Install MAUI Android workload
        if: steps.cache-workload.outputs.cache-hit != 'true'
        run: dotnet workload install maui-android --skip-manifest-update

      - name: Restore dependencies
        run: dotnet restore NdiForAndroid.sln

      - name: Build Core
        run: dotnet build src/Core/NdiForAndroid.Core.csproj -c Release --no-restore

      - name: Build MauiApp
        run: dotnet build src/MauiApp/NdiForAndroid.csproj -c Release --no-restore

      - name: Run unit tests
        run: >
          dotnet test
          tests/MauiApp.Tests/NdiForAndroid.Tests.csproj
          -c Release --no-restore
          --logger "trx;LogFileName=test-results.trx"
          --results-directory test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/*.trx
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────
  # Stage 2 — Publish APK (only if build-and-test passed)
  # ──────────────────────────────────────────────────────
  publish-apk:
    name: Publish APK
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.301'

      - name: Cache MAUI workload
        id: cache-workload
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/workloads
          key: workload-net10.0-android-10.0.20
          restore-keys: |
            workload-net10.0-android-

      - name: Install MAUI Android workload (skip if cached)
        if: steps.cache-workload.outputs.cache-hit != 'true'
        run: dotnet workload install maui-android --skip-manifest-update

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish Release APK
        run: >
          dotnet publish src/MauiApp/NdiForAndroid.csproj
          -f net10.0-android -c Release -o publish-output
          /p:AndroidPackageFormat=apk

      - name: Locate APK
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Path publish-output -Filter "*.apk" -Recurse | Select-Object -First 1
          "APK_PATH=$($apk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8

      # ── On main → create/release a GitHub Release
      - name: Read version
        if: github.ref == 'refs/heads/main'
        id: version
        shell: pwsh
        run: |
          $props = @{}
          Get-Content version.properties | ForEach-Object {
            if ($_ -match '^\s*([^#=]+)=(.*)$') { $props[$matches[1].Trim()] = $matches[2].Trim() }
          }
          $vn = $props['versionName']
          if ([string]::IsNullOrWhiteSpace($vn)) { Write-Error 'versionName missing'; exit 1 }
          "VERSION_NAME=$vn" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TAG_NAME=v$vn" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "tag_name=v$vn" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # GitHub Release (main only)
      - name: Publish release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: NDI for Android ${{ env.VERSION_NAME }}
          files: ${{ env.APK_PATH }}
          fail_on_unmatched_files: true
          generate_release_notes: true

      # PR artifact (feature branches)
      - name: Upload APK to PR
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: ${{ env.APK_PATH }}
          retention-days: 3

