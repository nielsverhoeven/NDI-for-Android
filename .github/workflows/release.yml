name: Release

on:
  workflow_run:
    workflows:
      - MAUI CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      prerelease:
        description: Mark as pre-release
        required: false
        default: 'true'
        type: string

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore NdiForAndroid.sln

      - name: Run unit tests
        run: dotnet test tests/MauiApp.Tests/MauiApp.Tests.csproj --no-restore -c Release

      - name: Determine release mode
        id: release_mode
        shell: pwsh
        run: |
          $isPre = '${{ github.event.inputs.prerelease }}' -eq 'true' -or '${{ github.ref }}' -ne 'refs/heads/main'
          if ($isPre) {
            'IS_PRERELEASE=true' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            'is_prerelease=true' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            'IS_PRERELEASE=false' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            'is_prerelease=false' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Read version from version.properties
        id: version
        shell: pwsh
        run: |
          $props = @{}
          Get-Content version.properties | ForEach-Object {
            if ($_ -match '^\s*([^#=]+)=(.*)$') { $props[$matches[1].Trim()] = $matches[2].Trim() }
          }
          $versionName = $props['versionName']
          if ([string]::IsNullOrWhiteSpace($versionName)) {
            Write-Error 'versionName not found in version.properties'
            exit 1
          }
          "VERSION_NAME=$versionName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TAG_NAME=v$versionName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version_name=$versionName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag_name=v$versionName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish MAUI Android APK
        shell: pwsh
        run: |
          dotnet publish src/MauiApp/NdiForAndroid.csproj `
            -f net10.0-android `
            -c Release `
            -o publish-output `
            /p:AndroidPackageFormat=apk

      - name: Locate APK artifact
        id: locate_apk
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Path publish-output -Filter "*.apk" -Recurse | Select-Object -First 1
          if (-not $apk) { Write-Error "No APK found in publish-output"; exit 1 }
          "APK_PATH=$($apk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "apk_path=$($apk.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: NDI for Android ${{ steps.version.outputs.version_name }}
          files: ${{ steps.locate_apk.outputs.apk_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ steps.release_mode.outputs.is_prerelease == 'true' }}
